<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة إدارة الشركات - 999 شركة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-teal-200">
        <h1 class="text-3xl font-bold text-teal-800 mb-6 border-b pb-4">إدارة 999 شركة - النجف الأشرف</h1>
        
        <form id="company-form" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-teal-50 p-6 rounded-lg">
            <input type="text" id="c-name" placeholder="اسم الشركة" required class="p-2 border rounded">
            <input type="text" id="c-sector" placeholder="قطاع العمل" required class="p-2 border rounded">
            <input type="text" id="c-whatsapp" placeholder="رقم الواتساب" required class="p-2 border rounded">
            <input type="text" id="c-location" placeholder="الموقع" required class="p-2 border rounded md:col-span-2">
            <input type="text" id="c-needs" placeholder="المهن المطلوبة" required class="p-2 border rounded">
            <button type="submit" class="bg-teal-700 text-white p-2 rounded font-bold hover:bg-teal-900">إضافة شركة</button>
        </form>

        <div class="overflow-x-auto">
            <table class="w-full text-right border-collapse">
                <thead class="bg-teal-800 text-white">
                    <tr>
                        <th class="p-3">ت</th>
                        <th class="p-3">اسم الشركة</th>
                        <th class="p-3">المهن المطلوبة</th>
                        <th class="p-3">إجراء</th>
                    </tr>
                </thead>
                <tbody id="companies-body" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        let companies = JSON.parse(localStorage.getItem('najafCompanies')) || [];

        document.getElementById('company-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if(companies.length >= 999) { alert('لقد وصلت للحد الأقصى (999 شركة)'); return; }
            
            const newCompany = {
                id: companies.length + 1,
                name: document.getElementById('c-name').value,
                sector: document.getElementById('c-sector').value,
                whatsapp: document.getElementById('c-whatsapp').value,
                location: document.getElementById('c-location').value,
                needs: document.getElementById('c-needs').value
            };
            
            companies.push(newCompany);
            localStorage.setItem('najafCompanies', JSON.stringify(companies));
            renderTable();
            this.reset();
        });

        function renderTable() {
            const body = document.getElementById('companies-body');
            body.innerHTML = companies.map((c, i) => `
                <tr>
                    <td class="p-3">${i + 1}</td>
                    <td class="p-3 font-bold">${c.name}</td>
                    <td class="p-3 text-sm text-gray-600">${c.needs}</td>
                    <td class="p-3"><button onclick="deleteC(${c.id})" class="text-red-500">حذف</button></td>
                </tr>
            `).join('');
        }
        function deleteC(id) { companies = companies.filter(c => c.id !== id); localStorage.setItem('najafCompanies', JSON.stringify(companies)); renderTable(); }
        renderTable();
    </script>
</body>
</html>
