<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشركات - النجف الأشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-50">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md border border-gray-200">
        <h2 class="text-2xl font-bold text-teal-800 mb-4">إضافة وتوثيق الشركات</h2>
        
        <form id="company-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input type="text" id="c-name" placeholder="اسم الشركة" required class="p-2 border rounded">
            <input type="text" id="c-sector" placeholder="قطاع العمل" required class="p-2 border rounded">
            <input type="text" id="c-whatsapp" placeholder="رقم الواتساب" required class="p-2 border rounded">
            <input type="text" id="c-location" placeholder="الموقع الجغرافي" required class="p-2 border rounded">
            <input type="text" id="c-needs" placeholder="المهن المطلوبة" required class="p-2 border rounded md:col-span-2">
            <button type="submit" class="bg-teal-700 text-white p-2 rounded font-bold hover:bg-teal-900 md:col-span-2">حفظ الشركة في القاعدة</button>
        </form>

        <table class="w-full text-right border-collapse mt-4">
            <thead class="bg-teal-800 text-white">
                <tr>
                    <th class="p-2">الشركة</th>
                    <th class="p-2">المهن</th>
                    <th class="p-2">إجراء</th>
                </tr>
            </thead>
            <tbody id="companies-body" class="divide-y divide-gray-200"></tbody>
        </table>
    </div>

    <script>
        let companies = JSON.parse(localStorage.getItem('najafCompanies')) || [];

        // تفعيل وظيفة الحفظ عند الضغط على الزر
        document.getElementById('company-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newCompany = {
                id: Date.now(),
                name: document.getElementById('c-name').value,
                sector: document.getElementById('c-sector').value,
                whatsapp: document.getElementById('c-whatsapp').value,
                location: document.getElementById('c-location').value,
                needs: document.getElementById('c-needs').value
            };
            
            companies.push(newCompany);
            localStorage.setItem('najafCompanies', JSON.stringify(companies));
            renderTable();
            this.reset();
        });

        function renderTable() {
            const body = document.getElementById('companies-body');
            body.innerHTML = companies.map(c => `
                <tr>
                    <td class="p-2 font-bold">${c.name}</td>
                    <td class="p-2 text-sm">${c.needs}</td>
                    <td class="p-2"><button onclick="deleteC(${c.id})" class="text-red-500">حذف</button></td>
                </tr>
            `).join('');
        }

        function deleteC(id) { 
            companies = companies.filter(c => c.id !== id); 
            localStorage.setItem('najafCompanies', JSON.stringify(companies)); 
            renderTable(); 
        }

        renderTable();
    </script>
</body>
</html>
